# ── IndexTTS2 Nginx 反向代理配置 ──────────────────────────────────────────────
# 部署位置：云端服务器 /etc/nginx/conf.d/tts.conf
# 包含：速率限制 + Tailscale IP 白名单 + HTTPS + 长超时

# ── 速率限制区域（在 http {} 块中定义，需加入 /etc/nginx/nginx.conf）────────────
# 注意：以下两行需放在 /etc/nginx/nginx.conf 的 http {} 块内，不能放在 server {} 块内
# limit_req_zone $binary_remote_addr zone=tts_ip_limit:10m rate=5r/m;
# limit_req_zone $http_x_api_key zone=tts_key_limit:10m rate=30r/m;

# ── 上游后端（本地 GPU 机器的 Tailscale IP） ─────────────────────────────────
upstream tts_backend {
    server 100.100.1.10:8000;    # ← 替换为你的本地机器 Tailscale IP
    keepalive 8;                 # 保持长连接，减少建连开销
}

# ── HTTPS 主配置 ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name tts.yourdomain.com;    # ← 替换为你的域名

    # SSL 证书（certbot 自动生成）
    ssl_certificate     /etc/letsencrypt/live/tts.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tts.yourdomain.com/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # 请求体大小（上传音频文件最大 50MB）
    client_max_body_size 50m;

    # 超时配置（TTS 推理最长 3 分钟）
    proxy_connect_timeout 30s;
    proxy_read_timeout    180s;
    proxy_send_timeout    180s;

    # 日志
    access_log /var/log/nginx/tts_access.log;
    error_log  /var/log/nginx/tts_error.log warn;

    # ── 健康检查（无需认证，供监控系统调用） ────────────────────────────────
    location /health {
        # Tailscale IP 白名单（健康检查允许内网访问）
        allow 100.0.0.0/8;
        allow 127.0.0.1;
        deny all;

        proxy_pass http://tts_backend;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
    }

    # ── API 接口（需要 API Key + IP 白名单） ─────────────────────────────────
    location / {
        # ── P1 安全加固：Tailscale IP 白名单 ────────────────────────────────
        # 只允许 Tailscale 虚拟网段（100.x.x.x）+ 云端服务器自身
        # 其他 IP 一律拒绝，防止 Key 泄露后公网攻击
        allow 100.0.0.0/8;               # Tailscale 虚拟网段
        allow 127.0.0.1;                 # 本机（云端服务器自测）
        # allow <你的云端服务器公网IP>/32;  # 可选：允许云端服务器公网 IP
        deny all;

        # ── P1 安全加固：速率限制（需先在 nginx.conf http{} 中定义 limit_req_zone） ──
        # limit_req zone=tts_ip_limit  burst=3  nodelay;
        # limit_req zone=tts_key_limit burst=10 nodelay;
        # limit_req_status 429;

        # API Key 空值快速拒绝
        if ($http_x_api_key = "") {
            return 403 '{"error":"Missing X-API-Key header"}';
        }

        proxy_pass http://tts_backend;

        # 传递真实客户端信息
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # HTTP/1.1 长连接
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 缓冲配置（大文件音频不缓冲，直接流式返回）
        proxy_buffering off;
    }
}

# ── HTTP → HTTPS 强制跳转 ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name tts.yourdomain.com;    # ← 同上，替换为你的域名
    return 301 https://$host$request_uri;
}
